{% extends "base.html" %}

{% block title %}{{ subject }}{% endblock %}

{% block content %}
  <h1 style="margin:0 0 16px;font-size:24px;line-height:32px;color:#111827;">Artifact rejected</h1>
  <p style="margin:0 0 16px;font-size:16px;line-height:24px;">Hello {{ recipient_name }},</p>
  <p style="margin:0 0 16px;font-size:16px;line-height:24px;">
    <strong>{{ artifact_title }}</strong> was rejected by {{ rejected_by }}.
  </p>
  <p style="margin:0 0 8px;font-size:16px;line-height:24px;">Reviewer notes:</p>
  <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px;margin:0 0 24px;font-size:15px;line-height:22px;color:#7f1d1d;">
    {{ rejection_notes }}
  </div>
  <p style="margin:0;">
    <a href="{{ app_url }}/artifacts/{{ artifact_id }}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;border-radius:8px;padding:12px 18px;font-weight:700;">Open artifact</a>
  </p>
{% endblock %}
