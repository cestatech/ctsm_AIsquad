{% extends "base.html" %}

{% block title %}{{ subject }}{% endblock %}

{% block content %}
  <h1 style="margin:0 0 16px;font-size:24px;line-height:32px;color:#111827;">Artifact approved</h1>
  <p style="margin:0 0 16px;font-size:16px;line-height:24px;">Hello {{ recipient_name }},</p>
  <p style="margin:0 0 16px;font-size:16px;line-height:24px;">
    <strong>{{ artifact_title }}</strong> was approved by {{ approved_by }}.
  </p>
  <p style="margin:0 0 24px;font-size:16px;line-height:24px;">
    Study: <strong>{{ study_name }}</strong>
  </p>
  <p style="margin:0;">
    <a href="{{ app_url }}/artifacts/{{ artifact_id }}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;border-radius:8px;padding:12px 18px;font-weight:700;">View artifact</a>
  </p>
{% endblock %}
