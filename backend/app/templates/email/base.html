<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ subject }}{% endblock %}</title>
  </head>
  <body style="margin:0;padding:0;background:#f6f8fb;color:#1f2937;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f6f8fb;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="640" cellpadding="0" cellspacing="0" style="width:640px;max-width:100%;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="background:#0f172a;color:#ffffff;padding:24px 32px;">
                <div style="font-size:20px;font-weight:700;letter-spacing:0.02em;">Celerius</div>
                <div style="font-size:12px;color:#cbd5e1;margin-top:4px;">Clinical trial lifecycle platform</div>
              </td>
            </tr>
            <tr>
              <td style="padding:32px;">
                {% block content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="background:#f8fafc;color:#64748b;font-size:12px;line-height:18px;padding:20px 32px;">
                This message was sent by {{ org_name }} through Celerius.
                <br>
                <a href="{{ app_url }}" style="color:#2563eb;text-decoration:none;">Open Celerius</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
