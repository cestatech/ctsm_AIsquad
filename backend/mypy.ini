# Mypy configuration for the Celerius backend.
#
# Strategy (per issue #44): start permissive and ratchet. The [mypy] section
# applies to all of app/. Modules listed below with ignore_errors=True carry
# pre-existing type errors (60 errors as of 2026-06-12) and are grandfathered;
# remove a module from the list once its errors are fixed so it stays clean.

[mypy]
python_version = 3.12
ignore_missing_imports = True
explicit_package_bases = True
namespace_packages = True
warn_unused_configs = True

# --- Grandfathered modules (pre-existing errors; do not add new entries) ---

[mypy-app.api.v1.endpoints.adam]
ignore_errors = True

[mypy-app.api.v1.endpoints.csr]
ignore_errors = True

[mypy-app.api.v1.endpoints.raw_data]
ignore_errors = True

[mypy-app.api.v1.endpoints.tlf]
ignore_errors = True

[mypy-app.repositories.generation_repository]
ignore_errors = True

[mypy-app.services.adam_generation_service]
ignore_errors = True

[mypy-app.services.csr_generation_service]
ignore_errors = True

[mypy-app.services.dual_programmer_qc_service]
ignore_errors = True

[mypy-app.services.export.docx_exporter]
ignore_errors = True

[mypy-app.services.generation_service]
ignore_errors = True

[mypy-app.services.generators.base_generator]
ignore_errors = True

[mypy-app.services.generators.edc_content_builder]
ignore_errors = True

[mypy-app.services.mapping_suggestion_service]
ignore_errors = True

[mypy-app.services.sdtm_generation_service]
ignore_errors = True

[mypy-app.services.submission_service]
ignore_errors = True

[mypy-app.services.tlf_generation_service]
ignore_errors = True
