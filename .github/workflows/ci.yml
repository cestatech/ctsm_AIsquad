name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install ruff mypy -r backend/requirements.txt
        working-directory: .
      - name: Ruff lint
        run: ruff check backend/app backend/tests
      - name: Ruff format check
        run: ruff format --check backend/app backend/tests

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: celerius_test
          POSTGRES_PASSWORD: celerius_test
          POSTGRES_DB: celerius_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://celerius_test:celerius_test@localhost:5432/celerius_test
          APP_SECRET_KEY: test-secret-key-for-ci-only-32chars
          JWT_SECRET_KEY: test-jwt-secret-for-ci-only-32chars
        run: |
          cd backend
          alembic upgrade head
      - name: Run tests
        env:
          APP_ENV: development
          DATABASE_URL: postgresql+asyncpg://celerius_test:celerius_test@localhost:5432/celerius_test
          REDIS_URL: redis://localhost:6379/0
          APP_SECRET_KEY: test-secret-key-for-ci-only-32chars
          JWT_SECRET_KEY: test-jwt-secret-for-ci-only-32chars
          STORAGE_BACKEND: filesystem
          STORAGE_LOCAL_PATH: /tmp/celerius-test-storage
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=80
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Type check
        run: pnpm type-check
        working-directory: frontend
      - name: Lint
        run: pnpm lint
        working-directory: frontend

  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Run tests
        run: pnpm test
        working-directory: frontend

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install Playwright
        run: pnpm install --frozen-lockfile && pnpm exec playwright install --with-deps
        working-directory: frontend
      - name: Start services
        run: docker compose -f infrastructure/docker-compose.dev.yml up -d --wait
        env:
          APP_SECRET_KEY: test-secret-key-for-ci-only-32chars
          JWT_SECRET_KEY: test-jwt-secret-for-ci-only-32chars
      - name: Run E2E tests
        run: pnpm test:e2e
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
